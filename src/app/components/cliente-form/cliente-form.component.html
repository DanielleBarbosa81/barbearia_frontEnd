<form #form="ngForm" (ngSubmit)="onSubmit(form)" class="container">
  <div class="row">
      <div class="col-12">
          <mat-form-field class="fil-col">
              <mat-label>Nome</mat-label>
              <input matInput name="nome" id="nome" [(ngModel)]="cliente.nome" #nameModel="ngModel" required>
              <mat-error *ngIf="nameModel.hasError('required')">Informe o nome do cliente</mat-error>
          </mat-form-field>
      </div>

      <div class="row">
          <div class="col-6">
              <mat-form-field class="fil-col">
                  <mat-label>E-mail</mat-label>
                  <input matInput name="email" id="email" [(ngModel)]="cliente.email" #emailModel="ngModel" required email>
                  <mat-error *ngIf="emailModel.hasError('required')">Informe o e-mail do cliente</mat-error>
                  <mat-error *ngIf="emailModel.hasError('email')">Informe um e-mail válido</mat-error>
              </mat-form-field>
          </div>
          <div class="col-6">
              <mat-form-field class="fil-col">
                  <mat-label>Celular</mat-label>
                  <input matInput name="telefone" id="telefone" [(ngModel)]="cliente.telefone" #phoneModel="ngModel" required mask="(00) 00000-0000">
                  <mat-error ngIf="phoneModel.hasError('required')">Informe o celular do cliente</mat-error>
              </mat-form-field>
          </div>
      </div>

      <div class="row">
          <div class="col div-button">
              <button type="submit" mat-flat-button [disabled]="form.invalid">Salvar</button>
          </div>
      </div>
  </div>
</form>
